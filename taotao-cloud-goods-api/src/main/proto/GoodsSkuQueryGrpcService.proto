syntax = "proto3";

package com.taotao.cloud.goods.api.grpc;

option java_multiple_files = true;
option java_package = "com.taotao.cloud.goods.api.grpc";
option java_outer_classname = "GoodsSkuQueryGrpcServiceProto";
//option objc_class_prefix = "HLW";

// The device service definition.
service GoodsSkuQueryGrpcService {
  // Sends a message
  rpc updateGoodsStuck (GoodsSkuQueryGrpcQuery) returns (GoodsSkuQueryGrpcResponse){}
  rpc updateBatchById (GoodsSkuQueryGrpcQuery) returns (GoodsSkuQueryGrpcResponse){}
  rpc getGoodsSkuByIdFromCache (GoodsSkuQueryGrpcQuery) returns (GoodsSkuQueryGrpcResponse){}
}

// The request message .
message GoodsSkuQueryGrpcQuery {
  string id = 1;
}

message GoodsSkuQueryGrpcResponse {
  string id = 1;
  string serialNum = 2;
  string userNum = 3;
  int32  status = 4;
  int32  type = 5;
  string address = 6;
  string createtime = 7;
  string updatetime = 8;
}
